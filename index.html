<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3">
  <title>Character Sheet | Runiformity's Websites</title>
  <meta name="description" content="A configurable Dungeon Master's Screen for resources and keeping track of combat">
  <meta name="author" content="runiformity173">
  <link href="./bootstrap.css" rel="stylesheet" type="text/css" />
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body onload="loadMain();document.getElementById('loading').classList.add('loaded')">
  <div id="loading">
    <div class="spinnerContainer">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </div>
  <div id="mainMenu"></div>
  <div class="sheet-pages"></div>
  <div id="topRightButton" class="ui-button" onclick="toggleEditing()">
    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16" id="edit-icon">
      <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
      <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
    </svg>
    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 24 24" id="done-edit-icon" style="display:none;">
      <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3m3-10H5V5h10z"></path>
    </svg>
  </div>
  <div id="topRightSecondButton" class="ui-button" onclick="openBonusesModal()" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16" id="edit-icon">
      <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
      <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
    </svg>
  </div>
  <div class="modal fade" id="weaponsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Weapons</h5>
          <button type="button" class="close-button" data-bs-dismiss="modal">
            <svg
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="currentColor">
              <path d="M2.146 2.146a.5.5 0 0 1 .708 0L8 7.293l5.146-5.147a.5.5 0 0 1
                .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8
                8.707l-5.146 5.147a.5.5 0 1 1-.708-.708L7.293 8
                2.146 2.854a.5.5 0 0 1 0-.708z"/>
            </svg>
          </button>
        </div>
        <div class="modal-body text-center">
          <div id="weaponList" class="text-start"></div>
          <button
            id="addWeaponBtn"
            type="button"
            class="btn btn-outline-light mt-3">
            Add Weapon
          </button>
          <div class="text-light mt-2">
            Maximum 3 weapons
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-light"
            data-bs-dismiss="modal">
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-light"
            id="saveWeaponsBtn">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="levelsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Classes and Levels</h5>
          <button type="button" class="close-button" data-bs-dismiss="modal">
            <svg
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="currentColor">
              <path d="M2.146 2.146a.5.5 0 0 1 .708 0L8 7.293l5.146-5.147a.5.5 0 0 1
                .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8
                8.707l-5.146 5.147a.5.5 0 1 1-.708-.708L7.293 8
                2.146 2.854a.5.5 0 0 1 0-.708z"/>
            </svg>
          </button>
        </div>
        <div class="modal-body text-center">
          <div id="levelList" class="text-start">
            <div><label class="form-label">Class</label></div>
            <div><label class="form-label">Levels</label></div>
          </div>
          <button
            id="addLevelBtn"
            type="button"
            class="btn btn-outline-light mt-3">
            Add Class
          </button>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-light"
            data-bs-dismiss="modal">
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-light"
            id="saveLevelsBtn">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="bonusesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Classes and Levels</h5>
          <button type="button" class="close-button" data-bs-dismiss="modal">
            <svg
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="currentColor">
              <path d="M2.146 2.146a.5.5 0 0 1 .708 0L8 7.293l5.146-5.147a.5.5 0 0 1
                .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8
                8.707l-5.146 5.147a.5.5 0 1 1-.708-.708L7.293 8
                2.146 2.854a.5.5 0 0 1 0-.708z"/>
            </svg>
          </button>
        </div>
        <div class="modal-body text-center">
          <div id="bonusList" class="text-start">
            <div><label class="form-label">Target</label></div>
            <div><label class="form-label">Bonus</label></div>
          </div>
          <button
            id="addBonusBtn"
            type="button"
            class="btn btn-outline-light mt-3">
            Add Additional Bonus
          </button>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-light"
            data-bs-dismiss="modal">
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-light"
            id="saveBonusesBtn">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="./bootstrap.js"></script>
  <script src="data.js"></script>
  <script src="menu.js"></script>
  <script src="weaponModal.js"></script>
  <script src="bonusModal.js"></script>
  <script src="helpers.js"></script>
  <script src="classModal.js"></script>
  <script src="editing.js"></script>
  <script src="display.js"></script>
  <script src="script.js"></script>
  <script src="help.js"></script>
  <script src="/sharedScripts/help.js"></script>

</body>

</html>
